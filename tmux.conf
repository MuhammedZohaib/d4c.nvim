# =============================================================================
# tmux.conf — Terminal-first dev environment
# =============================================================================

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g base-index 1           # windows start at 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-clipboard on
set -sg escape-time 0         # no delay for Neovim
set -g focus-events on        # pass focus events (for gitsigns, etc.)
set -g mode-keys vi           # vi keys in copy mode

# ── Keybindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (keep cwd)
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in cwd
bind c new-window -c "#{pane_current_path}"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move between windows
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ── Copy mode (vi) ────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line

# ── Dev Layouts ──────────────────────────────────────────────────────────────
# <prefix> D  → quick full-screen dev layout
bind D new-session -s dev \; \
  new-window -n "code" \; \
  split-window -h -p 30 \; \
  select-pane -L \; \
  send-keys "nvim ." Enter \; \
  select-pane -R

# ── Status Bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 140

# Gruvbox Material Dark palette
set -g @grv_bg      "#282828"
set -g @grv_bg1     "#32302f"
set -g @grv_bg2     "#45403d"
set -g @grv_fg      "#d4be98"
set -g @grv_yellow  "#d8a657"
set -g @grv_green   "#a9b665"
set -g @grv_blue    "#7daea3"
set -g @grv_purple  "#d3869b"
set -g @grv_red     "#ea6962"
set -g @grv_orange  "#e78a4e"

set -g status-bg "#282828"
set -g status-fg "#d4be98"
set -g status-left  "#[fg=#282828,bg=#a9b665,bold] #S #[fg=#a9b665,bg=#282828]"
set -g status-right "#[fg=#45403d,bg=#282828]#[fg=#d4be98,bg=#45403d] %H:%M  %d %b #[fg=#d8a657,bg=#45403d]#[fg=#282828,bg=#d8a657,bold] #{host_short} "
set -g window-status-format         "#[fg=#45403d,bg=#282828] #I:#W "
set -g window-status-current-format "#[fg=#282828,bg=#d8a657]#[fg=#282828,bg=#d8a657,bold] #I:#W #[fg=#d8a657,bg=#282828]"
set -g window-status-activity-style "fg=#e78a4e"
set -g window-status-bell-style     "fg=#ea6962,bold"
set -g pane-border-style        "fg=#45403d"
set -g pane-active-border-style "fg=#d8a657"
set -g message-style "fg=#d8a657,bg=#32302f"
set -g mode-style    "fg=#282828,bg=#d8a657"

# ── Plugins (via TPM) ────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"   # persist sessions across restarts
set -g @plugin "tmux-plugins/tmux-continuum"   # auto-save sessions
set -g @plugin "tmux-plugins/tmux-yank"        # clipboard integration
set -g @plugin "christoomey/vim-tmux-navigator" # unified vim/tmux nav (C-h/j/k/l)
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore              "on"
set -g @continuum-save-interval        "10"

# Initialize TPM (keep at bottom)
run "~/.tmux/plugins/tpm/tpm"
