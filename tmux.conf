# =============================================================================
# tmux.conf — Terminal-first dev environment
# =============================================================================

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g set-clipboard on
set -sg escape-time 0         # no delay for Neovim
set -g focus-events on        # pass focus events (gitsigns, etc.)
set -g mode-keys vi

# ── Keybindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (keep cwd)
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in cwd
bind c new-window -c "#{pane_current_path}"

# Vim-like pane navigation (prefix + hjkl)
# Note: C-h/j/k/l handled by vim-tmux-navigator plugin
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move between windows
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ── Copy mode (vi) ────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line

# ── Dev Layouts ──────────────────────────────────────────────────────────────
# <prefix> D  → quick full-screen dev layout
# -A = attach if session already exists instead of erroring
bind D new-session -A -s dev \; \
  new-window -n "code" \; \
  split-window -h -p 30 \; \
  select-pane -L \; \
  send-keys "nvim ." Enter \; \
  select-pane -R

# ── Status Bar — Gruvbox Material Dark ───────────────────────────────────────
# NOTE: egel/tmux-gruvbox plugin removed — it ran after TPM init and silently
# overwrote everything below. This hand-crafted theme is now actually applied.

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 140

set -g status-bg "#282828"
set -g status-fg "#d4be98"

set -g status-left  "#[fg=#282828,bg=#a9b665,bold] #S #[fg=#a9b665,bg=#282828]"
# Fixed: #{host_short} is not a valid tmux variable — use #h (short hostname)
set -g status-right "#[fg=#45403d,bg=#282828]#[fg=#d4be98,bg=#45403d] %H:%M  %d %b #[fg=#d8a657,bg=#45403d]#[fg=#282828,bg=#d8a657,bold] #h "

set -g window-status-format         "#[fg=#45403d,bg=#282828] #I:#W "
set -g window-status-current-format "#[fg=#282828,bg=#d8a657]#[fg=#282828,bg=#d8a657,bold] #I:#W #[fg=#d8a657,bg=#282828]"
set -g window-status-activity-style "fg=#e78a4e"
set -g window-status-bell-style     "fg=#ea6962,bold"

set -g pane-border-style        "fg=#45403d"
set -g pane-active-border-style "fg=#d8a657"
set -g message-style            "fg=#d8a657,bg=#32302f"
set -g mode-style               "fg=#282828,bg=#d8a657"

# ── Plugins (via TPM) ────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"
# tmux-sensible removed — all settings it would provide are already set above
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "christoomey/vim-tmux-navigator"
# egel/tmux-gruvbox removed — was overwriting the custom status bar above

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore               "on"
set -g @continuum-save-interval         "10"

# Initialize TPM (keep at bottom)
run "~/.tmux/plugins/tpm/tpm"
